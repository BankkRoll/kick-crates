name: Feature request
description: Suggest an improvement or new capability for KickCrates.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please explain the problem first, then the proposed solution — feature requests that start from a proposed implementation without the underlying motivation are usually hard to act on.

        **Reminder:** KickCrates is earn-only. Proposals that introduce pay-to-win mechanics or purchased XP/scrap will be closed.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
        - label: This proposal respects the earn-only, no-p2w constraint.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain point, not the fix you have in mind. "I can't tell which emotes I already own" beats "add a checkmark to the collection grid."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should KickCrates do? Rough sketches, flows, or wireframes are welcome but not required.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Crates / drops
        - Battle pass / seasons
        - Collection / loadout UI
        - Emotes / badges / name colors / profile cards / chat flair
        - Chat integration on Kick.com
        - Auth / account
        - Anti-cheat / anti-abuse
        - Dev / build / docs
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots from other products, prior-art examples, or anything else useful.
